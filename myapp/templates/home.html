<h1>Student List</h1>

{% for student in students %}
    <p>{{ student.name }} - {{ student.email }} - {{ student.age }}</p>
{% endfor %}




<a href="/add/">Add Student</a>

<table border="1">
   


    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.age }}</td>
        <td>
            <a href="/update/{{student.id}}">Edit</a>
            <a href="/delete/{{student.id}}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
